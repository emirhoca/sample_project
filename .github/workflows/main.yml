name: Python CI

on:
  push: {}
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    env:
      TESTMON_NET_ENABLED: 'true'
      TESTMON_SERVER: "https://ezmon.aloiz.ch"
      REPO_ID: ${{ github.repository }}
      JOB_ID: "ubuntu-latest-py3.12_new_repo_2"

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"

    - name: Set up uv
      uses: astral-sh/setup-uv@v5

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        uv sync

    - name: Install testmon plugin
      run: |
        uv pip install "git+https://github.com/andreas16700/pytest-testmon@main"

    - name: Run test suite
      env:
        EZMON_VERSIONING: "1"
      run: |
        start_time=$(python -c "import time; print(time.time())")
        uv run pytest --ezmon -v 2>&1 | tee pytest_output.txt || true
        end_time=$(python -c "import time; print(time.time())")
        duration=$(python -c "print(f'{float($end_time) - float($start_time):.4f}')")
        db_size=$(python -c "import os; print(os.path.getsize('.testmondata')) if os.path.exists('.testmondata') else print(0)")
        tests_ran=$(grep -E "passed|failed|error" pytest_output.txt | tail -1 || echo "unknown")
        echo "### Testmon (ubuntu-latest - py3.12)" >> $GITHUB_STEP_SUMMARY
        echo "- **Duration:** ${duration} seconds" >> $GITHUB_STEP_SUMMARY
        echo "- **DB Size:** ${db_size} bytes" >> $GITHUB_STEP_SUMMARY
        echo "- **Results:** ${tests_ran}" >> $GITHUB_STEP_SUMMARY

    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-result-ubuntu-py3.12-testmon
        path: result-*.json
